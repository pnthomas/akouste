<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akoúste</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1 class="title">Akoúste</h1>
      </header>

      <p id="status" class="status" role="status"></p>

      <div class="mode-tabs" role="tablist" aria-label="Practice mode">
        <button
          type="button"
          class="mode-tab"
          role="tab"
          id="tab-mcq"
          aria-selected="true"
          aria-controls="panel-mcq"
        >
          Multiple choice
        </button>
        <button
          type="button"
          class="mode-tab"
          role="tab"
          id="tab-listen"
          aria-selected="false"
          aria-controls="panel-listen"
        >
          Listen only
        </button>
      </div>

      <section
        id="panel-mcq"
        class="card tab-panel"
        role="tabpanel"
        aria-labelledby="tab-mcq"
      >
        <p class="filter-sentence">
          <span class="filter-label">Words:</span>
          <select id="mcq-words-pool" class="filter-select" aria-label="Words pool"></select>
          <span class="filter-label">Choices:</span>
          <select id="mcq-choices-pool" class="filter-select" aria-label="Choices pool"></select>
        </p>

        <p id="mcq-greek-display" class="greek-display" data-state="idle">—</p>

        <div id="mcq-options" class="mcq-options" role="group" aria-label="English choices"></div>

        <div class="action-groups">
          <div class="action-group play-group">
            <button type="button" id="mcq-play" class="btn primary">Play</button>
            <button type="button" id="mcq-reveal" class="btn" disabled>Show Greek</button>
          </div>
          <div class="action-group response-group">
            <button type="button" id="mcq-guessed" class="btn guessed">Guessed it</button>
            <button type="button" id="mcq-know" class="btn positive">Know it</button>
            <button type="button" id="mcq-next" class="btn mcq-next-wide">Next question</button>
          </div>
        </div>
      </section>

      <section
        id="panel-listen"
        class="card tab-panel"
        role="tabpanel"
        aria-labelledby="tab-listen"
        hidden
      >
        <div
          id="listen-word-box"
          class="listen-word-box"
          aria-live="polite"
          aria-label="Current word"
        >
          <span id="greek-display" class="greek-display listen-word-greek" data-state="idle">—</span>
          <span id="listen-english-display" class="listen-word-english" hidden aria-hidden="true"></span>
        </div>

        <div class="action-groups">
          <div class="action-group play-group">
            <button type="button" id="btn-play" class="btn primary">Play</button>
            <button type="button" id="btn-reveal" class="btn" disabled>Show Greek</button>
          </div>
          <div class="action-group response-group">
            <button
              type="button"
              id="btn-understand"
              class="btn positive"
              disabled
              title="I understand"
            >
              καταλαβαίνω
            </button>
            <button
              type="button"
              id="btn-dont-understand"
              class="btn negative"
              disabled
              title="I don't understand"
            >
              δεν καταλαβαίνω
            </button>
          </div>
        </div>
      </section>
    </div>
    <p id="wordlist-meta" class="wordlist-meta" aria-live="polite"></p>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
